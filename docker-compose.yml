services:
  mysql:
    image: mysql:8.4
    container_name: gcat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: gcat_root_password
      MYSQL_DATABASE: gcat
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: gcat-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: gcat
      DB_USERNAME: root
      DB_PASSWORD: gcat_root_password
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: ./app
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api
    container_name: gcat-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
    ports:
      - "3001:3001"
    depends_on:
      - server

volumes:
  mysql_data:
  server_uploads:
