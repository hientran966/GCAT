version: "3.9"

services:
  server:
    build: ./server
    container_name: app-server
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env.docker
    depends_on:
      - mysql
      - redis
    restart: always

  mysql:
    image: mysql:8
    container_name: app-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: GCAT
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: app-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  mysql_data: